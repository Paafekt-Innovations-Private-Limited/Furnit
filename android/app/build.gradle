plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.google.gms.google-services'
    // id 'com.chaquo.python'  // Python backend (needs ARM torch wheels)
}

// ONNX-only by default: skip native (NCNN) builds unless explicitly enabled.
def enableNative = (project.findProperty("furnit.enableNative") ?: "false").toBoolean()

android {
    namespace 'com.furnit.android'
    compileSdk 34
    ndkVersion "26.3.11579264"

    // Keep ExecuTorch .pte models uncompressed (smaller heap during build, faster load at runtime)
    aaptOptions {
        noCompress 'pte'
    }

    defaultConfig {
        applicationId "com.furnit.android"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // Chaquopy Python (commented out -- PyTorch lacks ARM Android wheels)
        // python {
        //     buildPython "/opt/miniconda3/bin/python3"
        //     version "3.13"
        //     pip { install "numpy"; install "Pillow" }
        // }

        // CMake always builds ExecuTorch C++ tiles; NCNN is opt-in via furnit.enableNative
        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -frtti -fexceptions"
                def cmakeArgs = ["-DANDROID_STL=c++_shared"]
                if (enableNative) cmakeArgs.add("-DENABLE_NCNN=ON")
                arguments(*cmakeArgs)
            }
        }
    }

    // CMake build configuration (always enabled for ExecuTorch tiles)
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }

    if (enableNative) {
        sourceSets {
            main {
                jniLibs.srcDirs = ['src/main/jniLibs']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    kotlinOptions {
        jvmTarget = '11'
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        pickFirst '**/libfbjni.so'
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libexecutorch.so'
        pickFirst '**/libexecutorch_jni.so'
    }

    // 16 KB page alignment: our native libs (NCNN) are built with -Wl,-z,max-page-size=16384 in CMake.
    // Warnings about arcore_sdk, filament, fbjni, c++_shared come from third-party AARs; upgrade ARCore/
    // SceneView/ExecuTorch when they ship 16 KB-aligned libs for full compatibility on 16 KB devices.

    // ABI split: build only arm64-v8a APK (much smaller; works on almost all modern phones)
    splits {
        abi {
            enable true
            reset()
            include "arm64-v8a"
            universalApk false
        }
    }
}

// Package ExecuTorch INT8 models in APK for testing (copy only the 6 required .pte files)
// Use -PskipExecutorchAssets to build without embedding (e.g. when disk full); then push models to device.
def execInt8Dir = project.file("../executorch_int8_models")
def execChunkedDir = project.file("../executorch_models")
def assetsModelsDir = project.file("src/main/assets/models")
def skipExecutorchAssets = project.hasProperty("skipExecutorchAssets")
tasks.register("copyExecutorchModelsIntoAssets", Copy) {
    description = "Copy ExecuTorch INT8 .pte models into assets/models for packaging in APK"
    into assetsModelsDir
    from(execInt8Dir) {
        include "sharp_split_part1_int8.pte", "sharp_split_part2_int8.pte", "sharp_split_part3_int8.pte"
    }
    from(execChunkedDir) {
        include "sharp_split_part4a_chunk_512.pte", "sharp_split_part4a_chunk_65.pte", "sharp_split_part4b.pte"
    }
    from(execInt8Dir) {
        include "sharp_split_part4b_fp16.pte"
    }
    onlyIf { !skipExecutorchAssets && execInt8Dir.exists() && execChunkedDir.exists() }
}
if (!skipExecutorchAssets) preBuild.dependsOn copyExecutorchModelsIntoAssets

// libsharp_executorch_tiles.so links against the AAR's lib; that lib has SONAME libexecutorch_jni.so.
// Package a copy under that name so the loader finds it at runtime.
def executorchLibDir = project.file("src/main/cpp/executorch_lib")
def jniLibsArm64 = project.file("src/main/jniLibs/arm64-v8a")
tasks.register("copyExecutorchJniAsSoname", Copy) {
    description = "Copy libexecutorch.so as libexecutorch_jni.so so loader finds it by SONAME"
    from(executorchLibDir) { include "libexecutorch.so" }
    into jniLibsArm64
    rename "libexecutorch.so", "libexecutorch_jni.so"
    onlyIf { executorchLibDir.exists() && project.file("${executorchLibDir}/libexecutorch.so").exists() }
}
preBuild.dependsOn copyExecutorchJniAsSoname

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.10"
    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.activity:activity-ktx:1.7.2'
    implementation 'androidx.fragment:fragment-ktx:1.5.7'

    // WebView asset loading for SparkJS
    implementation 'androidx.webkit:webkit:1.8.0'

    // CameraX
    implementation 'androidx.camera:camera-core:1.2.3'
    implementation 'androidx.camera:camera-camera2:1.2.3'
    implementation 'androidx.camera:camera-lifecycle:1.2.3'
    implementation 'androidx.camera:camera-view:1.2.3'
    implementation 'androidx.camera:camera-extensions:1.2.3'

    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.1'

    // ARCore
    implementation 'com.google.ar:core:1.37.0'

    // TensorFlow Lite / LiteRT for on-device ML
    implementation 'org.tensorflow:tensorflow-lite:2.17.0'
    implementation 'org.tensorflow:tensorflow-lite-gpu:2.17.0'
    implementation 'org.tensorflow:tensorflow-lite-gpu-api:2.17.0'
    // ONNX Runtime Mobile for running exported ONNX models directly on Android
    // 1.24.2 fixes EXTENDED_OPT crash (shape merging on Concat, #24340); 1.18.0 was 18mo behind
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.24.2'

    // ExecuTorch for on-device inference (Vulkan delegate + view_convert_buffer_float_half for Part4b FP16)
    // Use locally built AAR from: ./scripts/build_executorch_vulkan_aar.sh
    implementation files('libs/executorch.aar')
    implementation 'com.facebook.soloader:soloader:0.10.5'
    implementation 'com.facebook.fbjni:fbjni:0.7.0'

    // PyTorch Mobile Lite - loads .ptl files directly (no model conversion)
    implementation('org.pytorch:pytorch_android_lite:2.1.0') {
        exclude group: 'com.facebook.fbjni', module: 'fbjni-java-only'
    }

    // SceneView for 3D model rendering (GLB/GLTF)
    implementation 'io.github.sceneview:sceneview:2.0.3'

    // Firebase
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-auth-ktx'
    implementation 'com.google.firebase:firebase-appcheck-playintegrity'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
