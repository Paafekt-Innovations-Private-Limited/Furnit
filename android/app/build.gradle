plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.google.gms.google-services'
    // id 'com.chaquo.python'  // Python backend (needs ARM torch wheels)
}

// ONNX-only by default: skip native (NCNN) builds unless explicitly enabled.
def enableNative = (project.findProperty("furnit.enableNative") ?: "false").toBoolean()

android {
    namespace 'com.furnit.android'
    compileSdk 34
    ndkVersion "26.3.11579264"

    defaultConfig {
        applicationId "com.furnit.android"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // Chaquopy Python (commented out -- PyTorch lacks ARM Android wheels)
        // python {
        //     buildPython "/opt/miniconda3/bin/python3"
        //     version "3.13"
        //     pip { install "numpy"; install "Pillow" }
        // }

        if (enableNative) {
            // NCNN native library support
            ndk {
                abiFilters 'arm64-v8a', 'armeabi-v7a'
            }

            // CMake configuration for NCNN
            externalNativeBuild {
                cmake {
                    cppFlags "-std=c++17 -frtti -fexceptions"
                    arguments "-DANDROID_STL=c++_shared"
                }
            }
        }
    }

    if (enableNative) {
        // CMake build configuration
        externalNativeBuild {
            cmake {
                path "src/main/cpp/CMakeLists.txt"
                version "3.22.1"
            }
        }

        // Include native libraries from jniLibs
        sourceSets {
            main {
                jniLibs.srcDirs = ['src/main/jniLibs']
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    kotlinOptions {
        jvmTarget = '11'
    }

    if (enableNative) {
        packagingOptions {
            jniLibs {
                useLegacyPackaging = true
            }
        }
    }

    // Resolve duplicate native libs between ExecuTorch and PyTorch Mobile
    packagingOptions {
        pickFirst '**/libfbjni.so'
        pickFirst '**/libc++_shared.so'
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.10"
    implementation 'androidx.core:core-ktx:1.10.1'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.activity:activity-ktx:1.7.2'
    implementation 'androidx.fragment:fragment-ktx:1.5.7'

    // WebView asset loading for SparkJS
    implementation 'androidx.webkit:webkit:1.8.0'

    // CameraX
    implementation 'androidx.camera:camera-core:1.2.3'
    implementation 'androidx.camera:camera-camera2:1.2.3'
    implementation 'androidx.camera:camera-lifecycle:1.2.3'
    implementation 'androidx.camera:camera-view:1.2.3'
    implementation 'androidx.camera:camera-extensions:1.2.3'

    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.1'

    // ARCore
    implementation 'com.google.ar:core:1.37.0'

    // TensorFlow Lite / LiteRT for on-device ML
    implementation 'org.tensorflow:tensorflow-lite:2.17.0'
    implementation 'org.tensorflow:tensorflow-lite-gpu:2.17.0'
    implementation 'org.tensorflow:tensorflow-lite-gpu-api:2.17.0'
    // ONNX Runtime Mobile for running exported ONNX models directly on Android
    // 1.24.2 fixes EXTENDED_OPT crash (shape merging on Concat, #24340); 1.18.0 was 18mo behind
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.24.2'

    // ExecuTorch for on-device inference (MobileNetV3 classification + SHARP room gen)
    implementation 'org.pytorch:executorch-android:1.1.0'

    // PyTorch Mobile Lite - loads .ptl files directly (no model conversion)
    implementation('org.pytorch:pytorch_android_lite:2.1.0') {
        exclude group: 'com.facebook.fbjni', module: 'fbjni-java-only'
    }

    // SceneView for 3D model rendering (GLB/GLTF)
    implementation 'io.github.sceneview:sceneview:2.0.3'

    // Firebase
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-auth-ktx'
    implementation 'com.google.firebase:firebase-appcheck-playintegrity'

    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
