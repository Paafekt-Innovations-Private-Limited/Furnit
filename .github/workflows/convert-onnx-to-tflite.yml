name: Convert PyTorch to TFLite

on:
  workflow_dispatch: {}

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build conversion Docker image
        run: |
          docker build -f scripts/Dockerfile.convert -t furnit/pt-convert:latest .

      - name: Run PyTorch -> TFLite conversion
        run: |
          mkdir -p android/output
          docker run --rm -v "${{ github.workspace }}":/workspace -w /workspace furnit/pt-convert:latest \
            android/yoloe-11l-seg-pf.pt android/output/yoloe_11l.tflite /workspace/tmp_conv

      - name: Upload TFLite artifact
        uses: actions/upload-artifact@v4
        with:
          name: yoloe_11l.tflite
          path: android/output/yoloe_11l.tflite
